<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG ID 编辑工具</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        h1 {
            grid-column: 1 / -1;
            color: #333;
        }
        .info {
            grid-column: 1 / -1;
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 12px;
            border-radius: 4px;
            color: #1565c0;
            font-size: 13px;
        }
        h2 {
            color: #555;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        input[type="file"],
        textarea,
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            margin-bottom: 10px;
        }
        textarea {
            min-height: 400px;
            resize: vertical;
        }
        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:hover {
            background: #5568d3;
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        #preview {
            width: 100%;
            height: 400px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 SVG ID 编辑工具</h1>
        
        <div class="info">
            工作流程：1. 上传 SVG 文件 → 2. 上传层级 CSV → 3. 写入层级并下载
        </div>

        <div style="grid-column: 1 / -1;">
            <h2>📂 第 1 步：上传 SVG 文件</h2>
            <label for="svgFile">选择 SVG 文件：</label>
            <input type="file" id="svgFile" accept=".svg" />
            <div id="message"></div>
        </div>

        <div style="grid-column: 1 / -1;">
            <h2>👁️ 预览</h2>
            <button onclick="previewSvg()">刷新预览</button>
            <div id="preview">
                <svg style="width: 100%; height: 100%;">
                    <text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="#999">
                        SVG 预览将显示在此
                    </text>
                </svg>
            </div>
        </div>

        <div style="grid-column: 1 / -1;">
            <h2>📋 第 2 步：上传行政层级 CSV</h2>
            <p style="font-size:13px;color:#555;">上传包含 <strong>level 3 (省) / level 2 (市) / level 1 (县)</strong> 三列的 CSV 文件。
            系统将自动填充空白单元格、建立父子关系，并将层级信息写入 SVG。</p>
            <label for="csvFile">选择层级 CSV 文件：</label>
            <input type="file" id="csvFile" accept=".csv" />
            <div id="csvStatus"></div>
            <div class="button-group" id="hierarchyButtons" style="display:none; margin-top:6px;">
                <button onclick="applyHierarchyToSvg()" style="background:#4caf50;">✓ 将层级关系写入 SVG</button>
            </div>
            <div id="hierarchyStats" style="margin-top:6px; font-size:12px; color:#555;"></div>
        </div>

        <div style="grid-column: 1 / -1;">
            <h2>💾 第 3 步：完成</h2>
            <div class="button-group">
                <button onclick="applySvg()" style="background: #4caf50;">✓ 应用更改</button>
                <button onclick="downloadSvg()" style="background: #2196F3;">⬇️ 下载修改后的 SVG</button>
                <button onclick="resetAll()" style="background: #f44336;">↺ 重置所有</button>
            </div>
        </div>

        <div style="grid-column: 1 / -1;">
            <h2>📝 原始 SVG 代码</h2>
            <label for="svgCode">SVG 源代码：</label>
            <textarea id="svgCode" placeholder="SVG 代码将显示在此..."></textarea>
        </div>
    </div>

    <script>
        let svgContent = '';
        let svgDoc = null;

        document.getElementById('svgFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    svgContent = event.target.result;
                    const parser = new DOMParser();
                    svgDoc = parser.parseFromString(svgContent, 'image/svg+xml');
                    
                    if (svgDoc.getElementsByTagName('parsererror').length > 0) {
                        showError('SVG 文件解析失败，请检查文件格式。');
                        return;
                    }

                    document.getElementById('svgCode').value = svgContent;
                    const count = svgDoc.querySelectorAll('path, polygon, circle, rect').length;
                    showSuccess(`✓ 成功加载 SVG 文件，共 ${count} 条路径。`);
                    previewSvg();
                } catch (error) {
                    showError('读取文件失败: ' + error.message);
                }
            };
            reader.readAsText(file);
        });

        function applySvg() {
            try {
                svgContent = new XMLSerializer().serializeToString(svgDoc);
                document.getElementById('svgCode').value = svgContent;
                showSuccess('✓ 更改已应用');
            } catch (error) {
                showError('应用更改失败: ' + error.message);
            }
        }

        function downloadSvg() {
            if (!svgContent) { showError('请先上传 SVG 文件'); return; }
            const blob = new Blob([svgContent], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'china-map-edited.svg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showSuccess('✓ SVG 文件已下载！');
        }

        function previewSvg() {
            if (!svgContent) return;
            document.getElementById('preview').innerHTML = svgContent;
        }

        function resetAll() {
            if (confirm('确定要重置所有更改吗？')) {
                svgContent = '';
                svgDoc = null;
                hierarchyData = null;
                document.getElementById('svgFile').value = '';
                document.getElementById('csvFile').value = '';
                document.getElementById('svgCode').value = '';
                document.getElementById('preview').innerHTML = '<svg style="width: 100%; height: 100%;"><text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="#999">SVG 预览将显示在此</text></svg>';
                document.getElementById('message').innerHTML = '';
                document.getElementById('csvStatus').innerHTML = '';
                document.getElementById('hierarchyStats').textContent = '';
                document.getElementById('hierarchyButtons').style.display = 'none';
            }
        }

        function showSuccess(msg) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="success">${msg}</div>`;
            setTimeout(() => { messageDiv.innerHTML = ''; }, 5000);
        }

        function showError(msg) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="error">${msg}</div>`;
            setTimeout(() => { messageDiv.innerHTML = ''; }, 5000);
        }

        // ── Hierarchy CSV upload ──────────────────────────────────────────────

        let hierarchyData = null;

        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                hierarchyData = parseCsvHierarchy(event.target.result);
                const { provinceCodes, cityCodes, countyCodes } = hierarchyData;
                document.getElementById('csvStatus').innerHTML =
                    `<div class="success">✓ 已加载：${provinceCodes.size} 个省，${cityCodes.size} 个市，${countyCodes.size} 个县/区</div>`;
                document.getElementById('hierarchyButtons').style.display = 'flex';
                // Show a few sample province codes
                document.getElementById('hierarchyStats').textContent =
                    '省份代码示例：' + Array.from(provinceCodes).slice(0, 6).join(', ');
            };
            reader.readAsText(file);
        });

        /**
         * Parse the 3-column CSV (level3=province, level2=city, level1=county).
         * Empty cells inherit the value from the previous row (continuation format).
         */
        function parseCsvHierarchy(csvText) {
            const lines = csvText.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim().split('\n');
            const dataLines = lines.slice(1); // skip header

            const countyToCity   = {}; // countyCode  → cityCode     (raw 6-digit)
            const cityToProvince = {}; // cityCode    → provinceCode (raw 6-digit)
            const provinceCodes  = new Set();
            const cityCodes      = new Set();
            const countyCodes    = new Set();

            let currentProvince = '';
            let currentCity     = '';

            for (const line of dataLines) {
                if (!line.trim()) continue;
                const cols = line.split(',').map(c => c.trim());
                const l3 = cols[0]; // province
                const l2 = cols[1]; // city
                const l1 = cols[2]; // county

                if (l3) currentProvince = l3;
                if (l2) currentCity     = l2;

                if (currentProvince) provinceCodes.add(currentProvince);

                if (currentCity) {
                    cityCodes.add(currentCity);
                    if (currentProvince) cityToProvince[currentCity] = currentProvince;
                }

                if (l1) {
                    countyCodes.add(l1);
                    if (currentCity)    countyToCity[l1]  = currentCity;
                }
            }

            return { countyToCity, cityToProvince, provinceCodes, cityCodes, countyCodes };
        }

        /**
         * For every path whose ID contains a 6-digit code:
         *  - Province → rename id to "xxxxxx-3", set data-level="3"
         *  - City      → rename id to "xxxxxx-2", set data-level="2", data-parent="provCode-3"
         *  - County    → keep id as "xxxxxx",     set data-level="1", data-parent="cityCode-2"
         * Then embed the full hierarchy as <metadata id="hierarchy"> JSON in the SVG.
         */
        function applyHierarchyToSvg() {
            if (!svgDoc)       { showError('请先上传 SVG 文件');         return; }
            if (!hierarchyData){ showError('请先上传层级 CSV 文件');     return; }

            const { countyToCity, cityToProvince, provinceCodes, cityCodes, countyCodes } = hierarchyData;
            const paths = svgDoc.querySelectorAll('path, polygon, circle, rect');
            let provinces = 0, cities = 0, counties = 0, unmatched = 0;

            paths.forEach(path => {
                const currentId = path.getAttribute('id') || '';
                const m = currentId.match(/(\d{6})/);
                if (!m) { unmatched++; return; }
                const code = m[1];

                if (provinceCodes.has(code)) {
                    path.setAttribute('data-level', '3');
                    path.removeAttribute('data-parent');
                    provinces++;

                } else if (cityCodes.has(code)) {
                    path.setAttribute('data-level', '2');
                    const parentCode = cityToProvince[code];
                    if (parentCode) path.setAttribute('data-parent', parentCode);
                    else            path.removeAttribute('data-parent');
                    cities++;

                } else if (countyCodes.has(code)) {
                    path.setAttribute('data-level', '1');
                    const parentCode = countyToCity[code];
                    if (parentCode) path.setAttribute('data-parent', parentCode);
                    else            path.removeAttribute('data-parent');
                    counties++;

                } else {
                    unmatched++;
                }
            });

            // Embed hierarchy JSON in <metadata id="hierarchy"> using raw 6-digit codes
            let metadata = svgDoc.querySelector('metadata#hierarchy');
            if (!metadata) {
                metadata = svgDoc.createElementNS('http://www.w3.org/2000/svg', 'metadata');
                metadata.setAttribute('id', 'hierarchy');
                const svgEl = svgDoc.querySelector('svg');
                svgEl.insertBefore(metadata, svgEl.firstChild);
            }
            metadata.textContent = JSON.stringify({ countyToCity, cityToProvince });

            applySvg();
            previewSvg();
            showSuccess(`✓ 层级已写入 SVG：${provinces} 省，${cities} 市，${counties} 县/区（${unmatched} 个未匹配路径）`);
        }
    </script>
</body>
</html>
